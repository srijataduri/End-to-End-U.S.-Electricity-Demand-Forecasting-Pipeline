version: 2

models:
  - name: dim_region
    columns:
      - name: region_key
        tests:
          - not_null
          - unique
      - name: respondent
        tests:
          - not_null
          - unique

  - name: fct_hourly_demand
    columns:
      - name: demand_value
        tests:
          - not_null
      - name: region_key
        tests:
          - not_null
          - relationships:
              to: ref('dim_region')
              field: region_key
